<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Gestión de Almacén - Panel principal">
    <title>ALMXN - Registrar Salida</title>

    <!-- ===== ESTILOS ===== -->
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/globalGestion.css">
    <link rel="stylesheet" href="../styles/agregarProducto.css">
</head>
<body>

    <input type="checkbox" id="theme-toggle" style="display:none">

    <!-- ===== ENCABEZADO ===== -->
    <header id="header-principal">
        <div class="header-contenedor">

            <!-- LOGO DEL SISTEMA -->
            <a class="logo" href="../index/main.html">
                <img src="../extras/logoPequeñoALMXNAlt.png" alt="Logo ALMXN" class="img img-logo">
            </a>

            <!-- BARRA DE NAVEGACIÓN -->
            <nav id="nav-principal">
                <ul class="nav-lista">
                    <li class="nav-item">
                        <a href="../index/main.html" class="nav-enlace">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/gestion.html" class="nav-enlace nav-enlace--activo">Gestión</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/contacto.html" class="nav-enlace">Contacto</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/publicidad.html" class="nav-enlace">Publicidad</a>
                    </li>
                </ul>
            </nav>

            <!-- USUARIO ACTUAL -->
            <div class="header-usuario">
                <span class="usuario-nombre">Juan Ramos</span>
                <span class="usuario-rol"><b>Administrador</b></span>
                <a href="../index/login.html" class="btn btn-secundario">Cerrar sesión</a>
            </div>

            <div>
                <label for="theme-toggle">
                    <div class="track">Activa</div>
                </label>
            </div>
            
        </div>
    </header>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main id="contenido-principal-gestion">

        <div class="centro-pagina-gestion">      
            
            <!-- TITULO/INICIO -->
            <section id="gestion-inicio" class="gestion-inicio">
                <h1 class="titulo-seccion">Registrar Salida</h1>
                <p class="subtitulo-seccion">Ingrese la información requerida:</p>
            </section>

            <!-- FORMULARIO -->
            <section id="formulario-agregar-producto" class="formulario">

                <div class="form-grupo">
                    <label for="nombre-producto-salida" class="form-label">Nombre del producto</label>
                    <input
                        type="text"
                        id="nombre-producto-salida"
                        name="nombre-producto-salida"
                        class="form-control"
                        placeholder="Ej: Cuaderno A4"
                        required
                    >
                </div>

                <div class="form-grupo">
                    <label for="cantidad-salida" class="form-label">Cantidad</label>
                    <input
                        type="number"
                        id="cantidad-salida"
                        name="cantidad-salida"
                        class="form-control"
                        placeholder="Ej: 10"
                        min="0"
                        required
                    >
                </div>

                <div class="form-grupo">
                    <label for="fecha-salida" class="form-label">Fecha</label>
                    <input
                        type="date"
                        id="fecha-salida"
                        name="fecha-salida"
                        class="form-control"
                        required
                    >
                </div>

                <div class="form-grupo">
                    <label for="motivo-salida" class="form-label">Motivo</label>
                    <select id="motivo-salida" name="motivo-salida" class="form-control">
                        <option value="" disabled selected>Seleccione un motivo</option>
                        <option value="1">Despacho</option>
                        <option value="2">Merma</option>
                        <option value="3">Otro</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="destino-salida" class="form-label">Destino (opcional)</label>
                    <input
                        type="text"
                        id="destino-salida"
                        name="destino-salida"
                        class="form-control"
                        required
                    >
                </div>

                <div class="form-grupo">
                    <label for="observacion-salida" class="form-label">Observaciones (opcional)</label>
                    <textarea
                        id="observacion-salida"
                        name="observacion-salida"
                        class="form-control"
                        placeholder="Observacion sobre la salida..."
                        rows="3"
                    ></textarea>
                </div>

                <!-- BOTONES GUARDAR/VOLVER -->
                <div class="formulario-acciones">
                    <a href="../index/gestion.html" class="btn btn-secundario">Volver</a>
                    <button type="submit" class="btn btn-primario" id="btn-registrar-salida">Registrar Salida</button>
                </div>

            </section>
        </div>

    </main>

    <!-- ===== PIE DE PÁGINA ===== -->
    <footer id="footer-principal" class="footer">
        <div class="footer-contenedor">
            <p class="footer-texto">&copy; 2026 Sistema de Gestión de Almacén.</p>
        </div>
    </footer>
</body>
</html>
