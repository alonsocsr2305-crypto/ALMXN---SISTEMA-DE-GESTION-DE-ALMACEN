<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Gestión de Almacén - Panel principal">
    <title>ALMXN - Agregar Producto</title>
    
    <!-- ===== ESTILOS ===== -->
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/globalGestion.css">
    <link rel="stylesheet" href="../styles/agregarProducto.css">
</head>
<body>

    <input type="checkbox" id="theme-toggle" style="display:none">

    <!-- ===== ENCABEZADO ===== -->
    <header id="header-principal">
        <div class="header-contenedor">

            <!-- LOGO DEL SISTEMA -->
            <a class="logo" href="../index/main.html">
                <img src="../extras/logoPequeñoALMXNAlt.png" alt="Logo ALMXN" class="img img-logo">
            </a>

            <!-- BARRA DE NAVEGACIÓN -->
            <nav id="nav-principal">
                <ul class="nav-lista">
                    <li class="nav-item">
                        <a href="../index/main.html" class="nav-enlace">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/gestion.html" class="nav-enlace nav-enlace--activo">Gestión</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/contacto.html" class="nav-enlace">Contacto</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/publicidad.html" class="nav-enlace">Publicidad</a>
                    </li>
                </ul>
            </nav>

            <!-- USUARIO ACTUAL -->
            <div class="header-usuario">
                <span class="usuario-nombre">Juan Ramos</span>
                <span class="usuario-rol"><b>Administrador</b></span>
                <a href="../index/login.html" class="btn btn-secundario">Cerrar sesión</a>
            </div>

            <div>
                <label for="theme-toggle">
                    <div class="track">Activa</div>
                </label>
            </div>

        </div>
    </header>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main id="contenido-principal-gestion">

        <div class="centro-pagina-gestion">

            <!-- TITULO/INICIO -->
            <section id="gestion-inicio" class="gestion-inicio">
                <h1 class="titulo-seccion">Editar Producto</h1>
                <p class="subtitulo-seccion">Ingrese la información requerida:</p>
            </section>

            <!-- FORMULARIO -->
            <section id="formulario-agregar-producto" class="formulario">

                <div class="form-grupo">
                    <label for="nombre-producto" class="form-label">Nombre del producto</label>
                    <input
                        type="text"
                        id="nombre-producto"
                        name="nombre-producto"
                        class="form-control"
                        placeholder="Ej: Cuaderno A4"
                        required
                    >
                </div>

                <div class="form-grupo">
                    <label for="categoria-producto" class="form-label">Categoría</label>
                    <select id="categoria-producto" name="categoria-producto" class="form-control">
                        <option value="" disabled selected>Seleccione una categoría</option>
                        <option value="1">Electrónica</option>
                        <option value="2">Papelería</option>
                        <option value="3">Limpieza</option>
                        <option value="4">Alimentos</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="unidad-medida" class="form-label">Unidad de medida</label>
                    <select id="unidad-medida" name="unidad-medida" class="form-control">
                        <option value="" disabled selected>Seleccione una unidad</option>
                        <option value="unidad">Unidad</option>
                        <option value="kg">Kilogramo (kg)</option>
                        <option value="litro">Litro (L)</option>
                        <option value="caja">Caja</option>
                        <option value="paquete">Paquete</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="stock-minimo" class="form-label">Stock mínimo</label>
                    <input
                        type="number"
                        id="stock-minimo"
                        name="stock-minimo"
                        class="form-control"
                        placeholder="Ej: 10"
                        min="0"
                        required
                    >
                </div>

                <div class="form-grupo">
                    <label for="descripcion-producto" class="form-label">Descripción <span class="formulario-opcional">(opcional)</span></label>
                    <textarea
                        id="descripcion-producto"
                        name="descripcion-producto"
                        class="form-control"
                        placeholder="Descripción breve del producto..."
                        rows="3"
                    ></textarea>
                </div>

                <!-- BOTONES GUARDAR/VOLVER -->
                <div class="formulario-acciones">
                    <a onclick="location.href='../index/adminproducto.html'" class="btn btn-secundario">Volver</a>
                    <button type="submit" class="btn btn-primario" id="btn-guardar-producto">Guardar producto</button>
                </div>

            </section>
        </div>
        
    </main>

    <!-- ===== PIE DE PÁGINA ===== -->
    <footer id="footer-principal" class="footer">
        <div class="footer-contenedor">
            <p class="footer-texto">&copy; 2026 Sistema de Gestión de Almacén.</p>
        </div>
    </footer>
</body>
</html>
