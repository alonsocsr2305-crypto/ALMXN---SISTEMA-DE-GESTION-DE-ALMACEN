<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registrar ingresos de productos">
    <title>ALMXN - Registrar Ingresos</title>

    <!-- ===== ESTILOS ===== -->
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/globalGestion.css">
    <link rel="stylesheet" href="../styles/agregarProducto.css">
</head>
<body>

    <input type="checkbox" id="theme-toggle" style="display:none">

    <!-- ===== ENCABEZADO ===== -->
    <header id="header-principal">
        <div class="header-contenedor">
            
            <!-- LOGO DEL SISTEMA -->
            <a class="logo" href="../index/main.html">
                <img src="../extras/logoPequeñoALMXNAlt.png" alt="Logo ALMXN" class="img img-logo">
            </a>

            <!-- BARRA DE NAVEGACIÓN -->        
            <nav id="nav-principal">
                <ul class="nav-lista">
                    <li class="nav-item">
                        <a href="../index/main.html" class="nav-enlace">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/gestion.html" class="nav-enlace nav-enlace--activo">Gestión</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/contacto.html" class="nav-enlace">Contacto</a>
                    </li>

                    <li class="nav-item">
                        <a href="../index/publicidad.html" class="nav-enlace">Publicidad</a>
                    </li>
                </ul>
            </nav>

            <!-- USUARIO ACTUAL -->
            <div class="header-usuario">
                <span class="usuario-nombre">Juan Ramos</span>
                <span class="usuario-rol"><b>Administrador</b></span>
                <a href="../index/login.html" class="btn btn-secundario">Cerrar sesión</a>
            </div>

            <div>
                <label for="theme-toggle">
                    <div class="track">Activa</div>
                </label>
            </div>
            
        </div>
    </header>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main id="contenido-principal-gestion">

        <div class="centro-pagina-gestion">

            <!-- TITULO/INICIO -->
            <section class="gestion-inicio">
                <h1 class="titulo-seccion">Registrar Ingreso</h1>
                <p class="subtitulo-seccion">Ingrese los datos del ingreso de productos</p>
            </section>

            <!-- FORMULARIO -->
            <section class="formulario">

                <div class="form-grupo">
                    <label for="nombre-producto-ingreso" class="form-label">Nombre del producto</label>
                    <input
                        type="text"
                        id="nombre-producto-ingreso"
                        name="nombre-producto-ingreso"
                        class="form-control"
                        placeholder="Ej: Cuaderno A4"
                        required
                        >
                </div>

                <div class="form-grupo">
                    <label for="cantidad-ingreso" class="form-label">Cantidad</label>
                    <input 
                        type="number"
                        id="cantidad-ingreso"
                        name="cantidad-ingreso"
                        class="form-control"
                        placeholder="Ej: 50"
                        min="0"
                        required>
                </div>

                <div class="form-grupo">
                    <label for="fecha-ingreso" class="form-label">Fecha</label>
                    <input 
                        type="date"
                        id="fecha-ingreso"
                        name="fecha-ingreso"
                        class="form-control"
                        required
                    >
                </div>

                <div class="form-grupo">
                    <label for="motivo-ingreso" class="form-label">Motivo</label>
                    <select id="motivo-ingreso" name="motivo-ingreso" class="form-control">
                        <option value="" disabled selected>Seleccione motivo</option>
                        <option value="1">Compra</option>
                        <option value="2">Devolución</option>
                        <option value="3">Otros</option>
                    </select>
                </div>

                <div class="form-grupo">
                    <label for="observacion-ingreso" class="form-label">Observaciones (opcional)</label>
                    <textarea 
                        id="observacion-ingreso"
                        name="observacion-ingreso"
                        class="form-control"
                        placeholder="Detalle del ingreso..."
                        rows="3"
                        ></textarea>
                </div>

                <!-- BOTONES GUARDAR/VOLVER -->
                <div class="formulario-acciones">
                    <a href="../index/gestion.html" class="btn btn-secundario">Volver</a>
                    <button class="btn btn-primario">Registrar Ingreso</button>
                </div>

            </section>

        </div>

    </main>

    <!-- ===== PIE DE PÁGINA ===== -->
    <footer id="footer-principal" class="footer">
        <div class="footer-contenedor">
            <p class="footer-texto">&copy; 2026 Sistema de Gestión de Almacén</p>
        </div>
    </footer>

</body>
</html>
